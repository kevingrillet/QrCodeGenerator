name: CI

# Intégration continue : qualité + tests unitaires + tests d'intégration (Playwright).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vérifier le formatage
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Vérification des types
        run: npm run typecheck

      - name: Tests unitaires / composants
        run: npm run test

      - name: Installer les navigateurs Playwright
        run: npx playwright install --with-deps chromium

      - name: Tests d'intégration (Playwright)
        run: npm run test:e2e

      - name: Vérifier que Storybook compile
        run: npm run build-storybook

      - name: Publier le rapport Playwright en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
