name: Lighthouse CI

# Audit de qualité web (performance, accessibilité, best-practices, SEO) via
# @lhci/cli. Le build est audité par un serveur statique interne à lhci
# (`staticDistDir`), reflétant le site déployé. Les budgets vivent dans
# `lighthouserc.json` : seule l'accessibilité est bloquante (`error`), le reste
# est en `warn` pour ne pas rendre la CI fragile aux variations de mesure.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lighthouse CI (collect + assert)
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
